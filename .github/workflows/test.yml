name: test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      # 서비스 연결 코드
      # - name: Check PowerShell
      #   run: $PSVersionTable

      # 소스코드 내려받는 코드
      - name: Checkout repository
        uses: actions/checkout@v4
        # with:
        #   path: .

      # node 버전 확인
      # - name: Check Node.js version
      #   run: node -v
      
      # node 모듈 다운로드 (`package.json`이 존재하는 경로가 필요함)
      - name: npm install
        working-directory: ./frontend
        run: npm i
      
      # 실행하는 코드 (실행시키는 경로가 있어야 함)
      # 단, dev로 실행하면 대기상태로 계속되서 배포용으로 부적격 (강제 cancel)
      - name: npm run
        working-directory: ./frontend
        # run: npm run dev
        run: npm run build
      
      # 서비스 프로그램 올리기(nginx) -> localhost
      # - name: nginx start
      #   run: docker run -d -p 80:80 -v ./frontend/dist:/usr/share/nginx/html --name web nginx:1.28
      
      # 서비스 프로그램 올리기 2 -> 만약 container가 켜져 있으면 강제로 지우고 해라 (켜진애가 있을 경우에만 정상 작동)
      # 리액트 라우터 사용시 nginx 설정파일(default.conf)이 없으면 정상 작동하지 않음
      - name: nginx start
        run: |
          docker rm -f web
          docker run -d -p 80:80 -v ./frontend/dist:/usr/share/nginx/html -v ./frontend/default.conf:/etc/nginx/conf.d/default.conf --name web nginx:1.28
      
      # MariaDB 컨테이너 실행
      - name: MariaDB run
        run: |
          docker run -d `
            --name diary-db `
            -p 23306:3306 `
            -e MARIADB_ROOT_PASSWORD=${{ secrets.MARIADB_ROOT_PASSWORD }} `
            -e MARIADB_DATABASE=${{ vars.MARIADB_DATABASE }} `
            -e MARIADB_USER=${{ vars.MARIADB_USER }} `
            -e MARIADB_PASSWORD=${{ secrets.MARIADB_PASSWORD }} `
            mariadb:12.1.2

      # backend 이미지 생성
      - name: uv image build
        working-directory: ./backend
        run: docker build -t uv:1 .

      # docker 실행
      # - name: fastapi run
      #   run: docker run -d -p 8001:8000 -v ./backend:/workspace --name back uv:1

      # FastAPI 컨테이너 실행
      - name: fastapi run
        run: |
          docker rm -f back || true
          docker run -d -p 8001:8000 `
            --name back `
            --link diary-db:db `
            -v ./backend:/workspace `
            -e MARIADB_HOST=db `
            -e MARIADB_PORT=${{ vars.MARIADB_PORT }} `
            -e MARIADB_USER=${{ vars.MARIADB_USER }} `
            -e MARIADB_PASSWORD=${{ secrets.MARIADB_PASSWORD }} `
            -e MARIADB_DATABASE=${{ vars.MARIADB_DATABASE }} `
            -e OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }} `
            -e OLLAMA_MODEL_NAME=${{ vars.OLLAMA_MODEL_NAME }} `
            uv:1